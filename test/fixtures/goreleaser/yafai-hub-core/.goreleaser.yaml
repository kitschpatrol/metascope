# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: yafai-core

before:
  hooks:
    - go mod tidy

builds:
  - id: yafai-core_linux_amd64
    main: ./main.go
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++

  - id: yafai-core_linux_arm64
    main: ./main.go
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++

  - id: yafai-core_darwin_amd64
    main: ./main.go
    goos: [darwin]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++

  - id: yafai-core_darwin_arm64
    main: ./main.go
    goos: [darwin]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
  
  - id: yafai-core_windows_amd64
    main: ./main.go
    goos: [windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
  - id: yafai-core_windows_arm64
    main: ./main.go
    goos: [windows]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=/llvm-mingw/bin/aarch64-w64-mingw32-gcc
      - CXX=/llvm-mingw/bin/aarch64-w64-mingw32-g++
archives:
  - id: yafai-core
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"



release:
  github:
    owner: YAFAI-Hub
    name: core
  footer: |
    ---
    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

brews:
  - name: yafai-core
    homepage: "https://github.com/YAFAI-Hub/core"
    description: "Core homebrew tap"
    license: "MIT"
    repository:
      owner: YAFAI-Hub
      name: homebrew-yafai
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"


changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
