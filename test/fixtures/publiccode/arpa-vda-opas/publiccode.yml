description:
  en:
    shortDescription: Il sistema OPAS è un'infrastruttura atta alla gestione di
      molteplici reti di monitoraggio dati sia chimici che meteo.
    longDescription: >-
      Il sistema OPAS è composto da un insieme di componenti Hardware e Software
      che vanno a formare un'infrastruttura atta alla gestione di molteplici
      reti di monitoraggio dati sia chimici che meteo.


      Le attività principali del sistema sono l'acquisizione, la validazione,
      l'elaborazione e l'export dei dati acquisiti nel tempo. E' composto da una
      parte centrale, formata dal Datacenter e dai software Web, e da una
      costellazione di sistemi di acquisizione periferici che vanno ad
      alimentare il database principale con i dati raccolti in periferia.
    features:
      - Visualizzazione dati
      - Analisi dati
      - Raccolta dati
      - Gestione inventario
