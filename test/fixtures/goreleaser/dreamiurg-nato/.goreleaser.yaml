version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: nato
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dreamiurg/nato/cmd.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true  # release-please manages changelog

brews:
  - name: nato
    repository:
      owner: dreamiurg
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/dreamiurg/nato"
    description: "Convert text to NATO phonetic alphabet"
    license: "MIT"
    install: |
      bin.install "nato"
    test: |
      system "#{bin}/nato", "--version"
