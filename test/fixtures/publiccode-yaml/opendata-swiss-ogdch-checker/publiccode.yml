description:
  en:
    localisedName: OGDCH Checker
    shortDescription: OGDCH Checker provides tools to validate and check datasets and resources of a CKAN-installation.
    longDescription: OGDCH Checker for opendata.swiss is used to regularly check the availability and validity of
      datasets and their resources on the [CKAN](https://ckan.org/) portal. The link-checker tool will check whether
      resource-URLs are valid and accessible via HTTP-request.
      The SHACL-checker validates datasets against a provided SHACL-graph.
      The checks can be scheduled via cronjobs and the results of both checkers can then be sent out automatically to
      the configured recipients.
  features:
    - check availability and validity of resource-URLs
    - validate datasets including their resources against a provided SHACL-graph
    - send out results as email-reports
