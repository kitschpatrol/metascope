description:
  de:
    localisedName: Mark-a-Spot
    shortDescription: Mängelmelder- und Fallmanagementsystem für Kommunen.
    longDescription: >-
      Mark-a-Spot ist eine modulare Plattform für digitale Bürgerbeteiligung und
      das kommunale Anliegen- und Beschwerdemanagement (Mängelmelder). Bürger können problemlos Probleme wie
      Infrastrukturschäden, Abfall oder Umweltprobleme über Smartphones melden,
      angereichert mit Fotos und Geodaten. Die Plattform bietet Verwaltungen
      ein leistungsstarkes Backoffice, offene APIs (Open311), mehrsprachige Unterstützung
      und Barrierefreiheitsfunktionen. Optionale KI-Module ermöglichen eine automatisierte
      Kategorisierung, Priorisierung und Datenschutzprüfungen.
    features:
      - Mängelmelder
      - Geodatenvisualisierung
      - Open311-konforme API
      - mobil-optimierte PWA
      - barrierefrei
      - mehrsprachige Benutzeroberfläche
      - Open Data Export
      - Bürgerfeedback
      - Workflow-Automatisierung (ECA)
      - Wiedervorlage / Nachverfolgung
      - Fallarchivierung & -aufbewahrung
    screenshots:
      - docs/assets/sshot-1.png
      - docs/assets/sshot-2.png
      - docs/assets/sshot-3.png
  en:
    localisedName: Mark-a-Spot
    shortDescription: Citizen issue reporting and case management system for municipalities.
    longDescription: >-
      Mark-a-Spot is a modular platform for digital citizen engagement and
      municipal case management. Citizens can easily report issues such as
      infrastructure damage, waste, or environmental concerns via smartphone,
      enriched with photos and geodata. The platform provides administrations
      with a powerful back office, open APIs (Open311), multilingual support,
      and accessibility features. Optional AI modules enable automated
      categorization, prioritization, and privacy checks.
    features:
      - citizen-reporting
      - geospatial-mapping
      - Open311-compliant API
      - mobile-optimized PWA
      - accessibility-ready
      - multilingual-interface
      - open-data export
      - citizen-feedback
      - workflow-automation (ECA)
      - case-resubmission / follow-up
      - case-archiving & retention
    screenshots:
      - docs/assets/sshot-1.png
      - docs/assets/sshot-2.png
      - docs/assets/sshot-3.png

