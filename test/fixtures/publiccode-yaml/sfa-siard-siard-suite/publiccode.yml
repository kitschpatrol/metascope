description:
  en:
    localisedName: SIARD Suite
    shortDescription: "SIARD Suite: Intuitive app for archiving, restoring,
      searching, and exporting relational database content in the SIARD format."
    longDescription: The SIARD (Software-Independent Archival of Relational
      Databases) standard defines a format for the long-term archival of
      relational database contents. To facilitate this process, the "Siard
      Suite" application offers a user-friendly graphical interface for
      archiving, restoring, searching, and exporting SIARD archives. With its
      intuitive design Siard Suite makes it easy to preserve valuable data from
      relational databases in a way that ensures its longevity and
      accessibility.
    documentation: https://www.bar.admin.ch/dam/bar/de/dokumente/kundeninformation/Manual_SIARD-Suite2.1.pdf.download.pdf/Handbuch%20Suite%202.2%20(engl.).pdf
