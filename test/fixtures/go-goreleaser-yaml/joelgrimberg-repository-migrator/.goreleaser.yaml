version: 2

project_name: repository-migrator

before:
  hooks:
    - go mod tidy

builds:
  - id: repository-migrator
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
    binary: repository-migrator

archives:
  - id: tarballs
    format: tar.gz
    builds: [repository-migrator]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - README.md

nfpms:
  - id: deb
    package_name: repository-migrator
    formats: [deb, rpm]
    maintainer: Maintainers <noreply@example.com>
    description: Repository migrator to GitLab with safe FF mode and mirroring
    homepage: https://github.com/joelgrimberg/repository-migrator
    license: MIT
    vendor: Repository Migrator
    section: utils
    priority: optional
    recommends:
      - git
    bindir: /usr/bin

release:
  github:
    owner: joelgrimberg
    name: repository-migrator
  draft: false
  prerelease: auto

changelog:
  sort: asc
  use: git

