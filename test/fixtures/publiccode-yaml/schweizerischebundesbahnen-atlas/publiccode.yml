description:
  en:
    localisedName: Atlas
    shortDescription: ATLAS is the SKI (Systemführerschaft Kundeninformation)
      business application for public transport in Switzerland.
    longDescription: >
      Atlas ist the system to manage lines, transport organisations, stops,
      tracks and data for accessibility for public transport in Switzerland.
      Transport operators manage their data on their own.
    documentation: https://opentransportdata.swiss/en/cookbook/routing-cookbook/ojp-fare/
    apiDocumentation: https://github.com/SchweizerischeBundesbahnen/atlas/README.md
    features:
      - Pricing information for public transport in Switzerland
      - OJPFare service for OJP 1.0 and OJP 2.0
      - Can also do OJP 1.0 and OJP 2.0 trip requests
