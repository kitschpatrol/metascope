name=MapController
version=2.1.1
author=Cesar Bautista | Adrián Rabadán
maintainer=UNIT Electronics
sentence=Complete I2C Device Manager with continuous testing, musical tones, system alerts and security-enhanced relay control for PY32F003 v6.0.0_lite devices.
paragraph=Advanced I2C device management library featuring device scanning, compatibility checking, continuous testing with statistics, PWM/buzzer control with musical tones (DO-SI), system alerts (SUCCESS/OK/WARNING/ALERT), PWM gradual frequencies (100Hz-1000Hz), NeoPixel management, sensor reading (PA4, ADC), I2C address management, device information retrieval, and comprehensive diagnostic tools. IMPORTANT: Relay commands moved to 0xA0-0xAF for security (prevents accidental openings from I2C corruption). Includes command-level compatibility with MapCRUD v1.x. Optimized for ESP32/ESP32-S series with PY32F003 firmware v6.0.0_lite devices.
category=Device Control
url=https://github.com/unit-electronics/MapController
architectures=esp32
